name: Deploy

on:
  push:
    branches: [main]

# Prevent concurrent deploys of the same branch
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ── 1. Apply DB migrations first ──────────────────────────────────────────
  migrate-db:
    name: Apply Supabase Migrations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Apply pending migrations
        run: supabase db push --db-url "${{ secrets.SUPABASE_DB_URL }}"

  # ── 2. Deploy backend to Render ───────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend (Render)
    runs-on: ubuntu-latest
    needs: migrate-db
    steps:
      - name: Trigger Render deploy hook
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            --retry 3 --retry-delay 5 \
            "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" | \
          grep -q "^2" || (echo "Render deploy hook failed" && exit 1)

      - name: Wait for Render health check
        run: |
          echo "Waiting for backend to become healthy..."
          for i in $(seq 1 30); do
            status=$(curl -s -o /dev/null -w "%{http_code}" \
              "${{ secrets.BACKEND_URL }}/health" || echo "000")
            if [ "$status" = "200" ]; then
              echo "Backend healthy after ${i}x10s"
              exit 0
            fi
            echo "  Attempt $i: status=$status, retrying in 10s..."
            sleep 10
          done
          echo "Backend did not become healthy within 5 minutes"
          exit 1

  # ── 3. Deploy frontend to Vercel ──────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend (Vercel)
    runs-on: ubuntu-latest
    needs: deploy-backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy to Vercel (production)
        run: |
          vercel deploy \
            --token "${{ secrets.VERCEL_TOKEN }}" \
            --prod \
            --yes \
            --cwd frontend
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  # ── 4. Post-deploy smoke test ─────────────────────────────────────────────
  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-frontend]
    steps:
      - name: Health check — backend
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.BACKEND_URL }}/health")
          echo "Backend health: $status"
          [ "$status" = "200" ] || exit 1

      - name: Health check — frontend
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.FRONTEND_URL }}")
          echo "Frontend health: $status"
          [ "$status" = "200" ] || exit 1
